<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metalife — Prisma Energi Diri</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e4dc;
    --text-dim: #8a8580;
    --besi: #a78bfa;
    --air: #60a5fa;
    --api: #f87171;
    --kayu: #4ade80;
    --tanah: #fb923c;
    --besi-dim: rgba(167,139,250,0.12);
    --air-dim: rgba(96,165,250,0.12);
    --api-dim: rgba(248,113,113,0.12);
    --kayu-dim: rgba(74,222,128,0.12);
    --tanah-dim: rgba(251,146,60,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* Background cosmic texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(96,165,250,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 30%, rgba(167,139,250,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Stars */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 92%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 88%, rgba(255,255,255,0.35) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  main { position: relative; z-index: 1; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
    position: relative;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 40px;
    background: var(--gold-dim);
  }

  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(42px, 8vw, 88px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 12px;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: clamp(16px, 2.5vw, 22px);
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 48px;
    max-width: 520px;
  }

  .prism-svg {
    margin: 0 auto 48px;
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #0a0a0f;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 100px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .hero-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 60px rgba(201,168,76,0.5);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 40px;
    margin: 40px 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
  }

  .divider-icon {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 14px;
  }

  /* ── CALCULATOR SECTION ── */
  .calc-section {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    text-align: center;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 600;
    text-align: center;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .section-desc {
    text-align: center;
    color: var(--text-dim);
    font-size: 16px;
    margin-bottom: 48px;
    font-style: italic;
  }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-card { padding: 24px; }
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .form-group input, .form-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .form-group input::placeholder { color: var(--text-dim); font-style: italic; }

  .form-group select option { background: #18181f; color: var(--text); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
    grid-column: 1 / -1;
    user-select: none;
  }

  .checkbox-row:hover { border-color: rgba(201,168,76,0.3); }

  .checkbox-row input[type=checkbox] { display: none; }

  .custom-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .checkbox-row input:checked ~ .custom-check {
    background: var(--gold);
    border-color: var(--gold);
  }

  .custom-check::after {
    content: '✓';
    font-size: 12px;
    color: #0a0a0f;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .checkbox-row input:checked ~ .custom-check::after { opacity: 1; }

  .checkbox-label {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .checkbox-label strong { color: var(--text); }

  .btn-kira {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    color: #0a0a0f;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    font-weight: 700;
    padding: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(201,168,76,0.25);
    margin-top: 8px;
  }

  .btn-kira:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 40px rgba(201,168,76,0.45);
  }

  .btn-kira:active { transform: translateY(0); }

  /* ── PRISM DIAGRAM (mini) ── */
  .prism-display {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .prism-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── RESULTS ── */
  #results {
    display: none;
    margin-top: 40px;
  }

  #results.visible { display: block; }

  .results-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .results-header h3 {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .results-header p {
    color: var(--text-dim);
    font-size: 15px;
    font-style: italic;
  }

  /* Prism node codes */
  .prisma-visual {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── ELEMENT CARDS ── */
  .element-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 500px) {
    .element-grid { grid-template-columns: 1fr; }
  }

  .element-card {
    border-radius: 14px;
    padding: 20px;
    border: 1px solid;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .element-card:hover { transform: translateY(-2px); }

  .element-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
  }

  .card-besi { border-color: rgba(167,139,250,0.3); background: var(--besi-dim); }
  .card-air  { border-color: rgba(96,165,250,0.3);  background: var(--air-dim);  }
  .card-api  { border-color: rgba(248,113,113,0.3); background: var(--api-dim);  }
  .card-kayu { border-color: rgba(74,222,128,0.3);  background: var(--kayu-dim); }
  .card-tanah{ border-color: rgba(251,146,60,0.3);  background: var(--tanah-dim);}

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
  }

  .card-besi .card-name { color: var(--besi); }
  .card-air  .card-name { color: var(--air);  }
  .card-api  .card-name { color: var(--api);  }
  .card-kayu .card-name { color: var(--kayu); }
  .card-tanah .card-name{ color: var(--tanah);}

  .card-level {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 4px 10px;
    border-radius: 100px;
    border: 1px solid;
  }

  .level-tinggi  { color: #f87171; border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.1); }
  .level-dinamik { color: #fb923c; border-color: rgba(251,146,60,0.4);  background: rgba(251,146,60,0.1);  }
  .level-ok      { color: #4ade80; border-color: rgba(74,222,128,0.4);  background: rgba(74,222,128,0.1);  }
  .level-lemah   { color: #94a3b8; border-color: rgba(148,163,184,0.3); background: rgba(148,163,184,0.08);}

  .card-emosi {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-style: italic;
  }

  .card-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .card-highlight {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .card-highlight strong { color: var(--gold); }

  /* Highlight elemen utama */
  .element-card.is-dominant {
    box-shadow: 0 0 30px -5px currentColor;
  }
  .card-besi.is-dominant { box-shadow: 0 0 30px -5px var(--besi); }
  .card-air.is-dominant  { box-shadow: 0 0 30px -5px var(--air);  }
  .card-api.is-dominant  { box-shadow: 0 0 30px -5px var(--api);  }
  .card-kayu.is-dominant { box-shadow: 0 0 30px -5px var(--kayu); }
  .card-tanah.is-dominant{ box-shadow: 0 0 30px -5px var(--tanah);}

  /* Dominant summary */
  .dominant-summary {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
    text-align: center;
  }

  .dominant-summary .dom-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .dominant-summary .dom-name {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .dominant-summary .dom-desc {
    font-size: 15px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* kod grid display */
  .kod-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 360px;
    margin-bottom: 20px;
  }

  .kod-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
  }

  .kod-cell-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .kod-cell-val {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.2;
  }

  /* prisma triangle SVG labels */
  .node-val {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    fill: var(--text);
  }

  .node-label {
    font-size: 10px;
    fill: var(--text-dim);
    font-family: 'Crimson Pro', serif;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 40px 24px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 14px;
  }

  footer a { color: var(--gold); text-decoration: none; }

  /* Error */
  .error-msg {
    color: var(--api);
    font-size: 14px;
    text-align: center;
    padding: 12px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    margin-top: 12px;
    display: none;
  }

  .error-msg.show { display: block; }

  /* reset btn */
  .btn-reset {
    display: block;
    margin: 20px auto 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 10px 24px;
    border-radius: 100px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-reset:hover { border-color: var(--gold); color: var(--gold); }

  /* scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    animation: revealUp 0.6s forwards;
  }

  @keyframes revealUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.35s; }
  .delay-4 { animation-delay: 0.5s; }

  /* ── RESULT TABLE ── */
  .result-table-wrap {
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .result-table {
    width: 100%;
    border-collapse: collapse;
  }

  .result-table thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .result-table th {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    padding: 14px 16px;
    text-align: center;
    font-weight: 500;
  }

  .result-table th span {
    display: block;
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }

  .col-elemen { text-align: left; width: 36%; }
  .col-zone   { width: 32%; }

  .result-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .result-table tbody tr:last-child { border-bottom: none; }
  .result-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  .result-table td {
    padding: 14px 16px;
    vertical-align: middle;
  }

  /* elemen name cell */
  .td-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .td-icon {
    font-size: 20px;
    line-height: 1;
  }

  .td-label {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
  }

  .td-sublabel {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    font-family: 'Crimson Pro', serif;
  }

  /* zone cell */
  .td-zone {
    text-align: center;
  }

  .zone-val {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .zone-bar {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    width: 80%;
    margin: 0 auto 6px;
  }

  .zone-bar-fill {
    height: 100%;
    border-radius: 2px;
  }

  .badge-tinggi {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 100px;
    color: #f87171;
    border: 1px solid rgba(248,113,113,0.4);
    background: rgba(248,113,113,0.08);
  }

  .badge-lemah {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 100px;
    color: #94a3b8;
    border: 1px solid rgba(148,163,184,0.25);
    background: rgba(148,163,184,0.06);
  }
</style>
</head>
<body>
<main>


  <!-- CALCULATOR -->
  <section class="calc-section" id="kira">
    <p class="section-label reveal">Langkah pertama</p>
    <h2 class="section-title reveal delay-1">Masukkan Maklumat Lahir</h2>


    <div class="form-card reveal delay-3">


      <!-- Form -->
      <div class="form-grid">
        <div class="form-group">
          <label>Tarikh Lahir (Hari)</label>
          <input type="number" id="inp-hari" placeholder="cth: 15" min="1" max="31"/>
        </div>
        <div class="form-group">
          <label>Bulan Lahir</label>

            <option value="">Pilih bulan...</option>

            <option value="2">Februari (2)</option>

      </div>

      <div id="error-msg" class="error-msg">Sila isi semua maklumat dengan betul.</div>

      <button class="btn-kira" onclick="kiraPrisma()">✦ Kira Prisma Energi Saya</button>

      <!-- RESULTS -->
      <div id="results">
        <div style="height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:40px 0;"></div>

        <!-- Table: Inner & Outer sebelah-sebelah -->
        <div class="result-table-wrap">
          <table class="result-table">
            <thead>
              <tr>
                <th class="col-elemen">Elemen</th>
                <th class="col-zone">Inner Zone<br><span>Dalaman Diri</span></th>
                <th class="col-zone">Outer Zone<br><span>Pengaruh Luaran</span></th>
              </tr>
            </thead>
            <tbody id="result-tbody"></tbody>
          </table>
        </div>

        <button class="btn-reset" onclick="resetForm()">↺ Kira Semula</button>
      </div>
    </div>


  </section>
</main>



<script>
// ── DATA ──
const elemenInfo = {

  6:{name:'BESI',color:'besi',emosi:'Fikiran',icon:'🧠'},
  2:{name:'AIR', color:'air', emosi:'Kasih Sayang',icon:'💙'},
  7:{name:'AIR', color:'air', emosi:'Kasih Sayang',icon:'💙'},

  8:{name:'API', color:'api', emosi:'Perasaan',icon:'🔥'},

  9:{name:'KAYU',color:'kayu',emosi:'Tindakan',icon:'🌿'},

};

const elemenDetail = {
  BESI:{

  AIR:{
    emosi:'Kasih Sayang',
    positif:'Disukai ramai, suka menolong, networking, socializing, perihatin, komunikatif.',

  API:{

    tinggi:'Pemarah, baran, agresif, boros, kalut, suka shortcut, berterabur.',
    atasi_lemah:'Cepat bertindak. Jadilah aktif. Orang akan mudah terima saranan anda.',
    atasi_tinggi:'Jaga perasaan. Jangan layani amarah orang lain. Cara & gaya kelembutan + care for them.',
    outer_tinggi:'Mudah terprovokasi dan naik angin bila dirangsang oleh sosial atau persekitaran tertentu.',
    outer_lemah:'Kurang bertindak balas secara spontan. Mudah mengikut arus persekitaran tanpa keazaman.',
    outer_atasi:'Elakkan persekitaran yang mencetuskan amarah. Pilih sosial yang memberi tenang dan semangat positif.',
  },
  KAYU:{
    emosi:'Tindakan',
    positif:'Pandai, tertib, ikut sistem, teratur, detail, perancang, organiser, pragmatik.',
    lemah:'Takut nak bertindak, tidak tahu cara, belajar hanya pada yang diminati sahaja.',
    tinggi:'Lagak pandai, ikut prosedur secara rigid, perfectionism, plan tapi tak buat.',
    atasi_lemah:'Utamakan keselamatan diri & keluarga. Belajar cara kreatif yang baru.',
    atasi_tinggi:'Jangan merancang je. Kena ada team untuk laksanakan. Kurangi rasa pandai.',
    outer_tinggi:'Bila berdepan tekanan luar, jadi terlalu rigid, perfectionist atau lagak tahu semua benda.',
    outer_lemah:'Bila berhadapan situasi baharu atau cabaran luar, cepat buntu dan tidak tahu nak bertindak.',
    outer_atasi:'Bina sistem tindakan yang fleksibel. Belajar dari pengalaman bukan sekadar dari buku atau plan.',
  },
  TANAH:{
    emosi:'Keyakinan',
    positif:'Tegas, yakin diri, memimpin, gigih, cita-cita tinggi, berkuasa, mengawal.',
    lemah:'Tiada ketegasan, kurang keyakinan, mudah dipijak orang, tiada prinsip kukuh.',
    tinggi:'Degil, ego, sombong, hero kampung, bossy, menekan, angkuh, pantang dicabar.',
    atasi_lemah:'Bangunkan ketegasan dan prinsip diri. Cari status dalam kehidupan.',
    atasi_tinggi:'Hargai orang lain. Kurangi ego. Kasihani orang sekeliling. Jangan tunjuk lagak.',
    outer_tinggi:'Bila dicabar oleh orang lain atau persekitaran — pantang kalah, ego meningkat, suka tunjuk kuasa.',
    outer_lemah:'Mudah tunduk kepada tekanan sosial. Tiada pendirian kukuh bila berhadapan orang lain.',
    outer_atasi:'Bina keyakinan melalui ilmu dan pengalaman. Jangan biar pandangan orang tentukan nilai diri anda.',
  },
};

// ── NAMA WARNA ELEMEN ──
const namaWarna = {
  BESI: 'Ungu',
  AIR:  'Biru',
  API:  'Merah',
  KAYU: 'Hijau',
  TANAH:'Coklat',
};

// ── GLOBAL STATE ──
let _innerCount = {}, _outerCount = {}, _currentTab = 'inner';

function toDigit(n) {
  n = Math.abs(parseInt(n));
  while (n > 9) {
    let s = 0;
    while (n > 0) { s += n % 10; n = Math.floor(n / 10); }
    n = s;
  }
  return n;
}

// Inner: 0=Lemah, 1-2=nombor sahaja, 3+=Tinggi
// TANAH inner: 0=Lemah, 1=nombor sahaja, 2+=Tinggi
function getInnerTahap(n, nama) {
  if (n === 0) return 'LEMAH';
  const threshold = (nama === 'TANAH') ? 2 : 3;
  if (n >= threshold) return 'TINGGI';
  return null; // cuma tunjuk nombor
}

// Outer: 0=tiada ulangan (papar "-"), nombor sahaja jika ada, Tinggi jika threshold
// TANAH: 2+= Tinggi, lain: 3+= Tinggi
function getOuterTahap(n, nama) {
  if (n === 0) return 'DASH';   // tiada nombor berulang → papar "-"
  const threshold = (nama === 'TANAH') ? 2 : 3;
  if (n >= threshold) return 'TINGGI';
  return null; // papar nombor sahaja
}

// ── MAIN CALC ──
function kiraPrisma() {
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  let hari = parseInt(document.getElementById('inp-hari').value);
  const bulan = parseInt(document.getElementById('inp-bulan').value);
  const tahun = parseInt(document.getElementById('inp-tahun').value);
  const subuh = document.getElementById('cbx-subuh').checked;

  if (!hari || !bulan || !tahun || hari<1 || hari>31 || bulan<1 || bulan>12 || tahun<1900 || tahun>2025) {
    errEl.classList.add('show');
    return;
  }

  if (subuh) hari = hari - 1;
  if (hari < 1) hari = 1;

  const kurun = Math.floor(tahun / 100);
  const tahun2 = tahun % 100;

  const A = toDigit(hari);
  const B = toDigit(bulan);
  const C = toDigit(kurun);
  const D = toDigit(tahun2 === 0 ? 9 : tahun2);

  // Inner zone
  const E = toDigit(A + B);
  const F = toDigit(C + D);
  const G = toDigit(E + F);
  const H = toDigit(B + C);
  const I = toDigit(G + H);

  // Outer zone: i=A+E, ii=B+E, iii=C+F, iv=D+F, v=F+G, vi=E+G
  const oi  = toDigit(A + E);
  const oii = toDigit(B + E);
  const oiii= toDigit(C + F);
  const oiv = toDigit(D + F);
  const ov  = toDigit(F + G);
  const ovi = toDigit(E + G);

  // Update SVG prism — inner + outer nodes
  updatePrism({A,B,C,D,E,F,G,H,I}, {oi,oii,oiii,oiv,ov,ovi});

  // Count inner
  const innerNodes = [A,B,C,D,E,F,G,H,I];
  const outerNodes = [oi,oii,oiii,oiv,ov,ovi];

  function addCount(nodes, obj) {
    nodes.forEach(v => {
      const info = elemenInfo[v];
      if (info) obj[info.name] = (obj[info.name]||0) + 1;
    });
  }

  const innerCount = {BESI:0,AIR:0,API:0,KAYU:0,TANAH:0};
  addCount(innerNodes, innerCount);

  // ── OUTER LOGIC BARU ──
  // 1. Kira berapa kali setiap NOMBOR berulang dalam outer nodes
  const outerNumFreq = {};
  outerNodes.forEach(v => { outerNumFreq[v] = (outerNumFreq[v]||0) + 1; });

  // 2. Cari elemen yang ada sekurang-kurangnya 1 nombor berulang (>=2 kali)
  const elemenWithRepeat = new Set();
  Object.entries(outerNumFreq).forEach(([numStr, freq]) => {
    if (freq >= 2) {
      const info = elemenInfo[parseInt(numStr)];
      if (info) elemenWithRepeat.add(info.name);
    }
  });

  // 3. Untuk elemen yang layak (ada ulangan), kira SEMUA nombor outer yg sama elemen
  const outerCount = {BESI:0,AIR:0,API:0,KAYU:0,TANAH:0};
  outerNodes.forEach(v => {
    const info = elemenInfo[v];
    if (info && elemenWithRepeat.has(info.name)) {
      outerCount[info.name] = (outerCount[info.name]||0) + 1;
    }
  });

  // Elemen yang tiada ulangan kekal 0 → papar "-"

  _innerCount = innerCount;
  _outerCount = outerCount;

  // Dominant (by inner)
  let dominant = 'BESI', maxC = -1;
  Object.entries(innerCount).forEach(([k,v]) => { if (v > maxC) { maxC = v; dominant = k; } });

  // Update base codes display
  // Build table
  _currentTab = 'inner';
  buildTable();

  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('visible');
  resultsEl.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── BUILD TABLE ──
function buildTable() {
  const tbody = document.getElementById('result-tbody');
  tbody.innerHTML = '';

  const elemenOrder = ['BESI','AIR','API','KAYU','TANAH'];
  const barColor = {BESI:'#a78bfa',AIR:'#60a5fa',API:'#f87171',KAYU:'#4ade80',TANAH:'#fb923c'};
  const nameColor = {BESI:'var(--besi)',AIR:'var(--air)',API:'var(--api)',KAYU:'var(--kayu)',TANAH:'var(--tanah)'};
  const iconMap = {BESI:'🧠',AIR:'💙',API:'🔥',KAYU:'🌿',TANAH:'🏔'};

  elemenOrder.forEach(nama => {
    const ic = _innerCount[nama];
    const oc = _outerCount[nama];
    const iTahap = getInnerTahap(ic, nama);
    const oTahap = getOuterTahap(oc, nama);
    const col = barColor[nama];
    const info = elemenDetail[nama];

    function badgeHtml(tahap, n) {
      if (tahap === 'TINGGI') return `<div class="badge-tinggi">Tinggi</div>`;
      if (tahap === 'LEMAH')  return `<div class="badge-lemah">Lemah</div>`;
      return '';
    }

    function cellHtml(count, tahap, maxBar, isOuter) {
      // Outer tiada ulangan: papar "-"
      if (isOuter && tahap === 'DASH') {
        return `<div class="td-zone"><div class="zone-val" style="color:var(--text-dim)">—</div></div>`;
      }
      const pct = Math.round(count / maxBar * 100);
      const numColor = tahap === 'TINGGI' ? '#f87171' : col;
      return `
        <div class="td-zone">
          <div class="zone-val" style="color:${numColor}">${count}</div>
          <div class="zone-bar"><div class="zone-bar-fill" style="width:${pct}%;background:${col};"></div></div>
          ${badgeHtml(tahap, count)}
        </div>`;
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="td-name">
          <span class="td-icon">${iconMap[nama]}</span>
          <div>
            <div class="td-label" style="color:${nameColor[nama]}">${namaWarna[nama]}</div>
            <div class="td-sublabel">${info.emosi}</div>
          </div>
        </div>
      </td>
      <td>${cellHtml(ic, iTahap, 9, false)}</td>
      <td style="border-left:1px solid var(--border);">${cellHtml(oc, oTahap, 6, true)}</td>`;
    tbody.appendChild(tr);
  });
}

// ── UPDATE PRISM SVG ──
function updatePrism(inner, outer) {
  const cMap = {besi:'#a78bfa',air:'#60a5fa',api:'#f87171',kayu:'#4ade80',tanah:'#fb923c'};
  const idMap = {A:'v-A',B:'v-B',C:'v-C',D:'v-D',E:'v-E',F:'v-F',G:'v-G',H:'v-H',I:'v-I'};
  Object.entries(inner).forEach(([k,v]) => {
    const el = document.getElementById(idMap[k]);
    if (!el) return;
    el.textContent = v;
    const info = elemenInfo[v];
    el.style.fill = info ? cMap[info.color] : '';
  });
  // Outer nodes
  const outerIdMap = {oi:'v-oi',oii:'v-oii',oiii:'v-oiii',oiv:'v-oiv',ov:'v-ov',ovi:'v-ovi'};
  Object.entries(outer).forEach(([k,v]) => {
    const el = document.getElementById(outerIdMap[k]);
    if (!el) return;
    el.textContent = v;
    const info = elemenInfo[v];
    el.style.fill = info ? cMap[info.color] : '#c9a84c';
  });
}

// ── RESET ──
function resetForm() {
  document.getElementById('inp-hari').value = '';
  document.getElementById('inp-bulan').value = '';
  document.getElementById('inp-tahun').value = '';
  document.getElementById('inp-masa').value = '';
  document.getElementById('cbx-subuh').checked = false;
  document.getElementById('results').classList.remove('visible');
  document.getElementById('result-tbody').innerHTML = '';
  const allIds = ['v-A','v-B','v-C','v-D','v-E','v-F','v-G','v-H','v-I','v-oi','v-oii','v-oiii','v-oiv','v-ov','v-ovi'];
  allIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = '—'; el.style.fill = ''; }
  });
  _currentTab = 'inner';
  window.scrollTo({ top: document.getElementById('kira').offsetTop - 40, behavior:'smooth' });
}


</script>
